<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="eyeClip">
      <path d="M 20,128 Q 128,52 236,128 Q 128,204 20,128 Z"/>
    </clipPath>
  </defs>

  <!-- Eye whites (subtle fill) -->
  <path d="M 20,128 Q 128,52 236,128 Q 128,204 20,128 Z"
        fill="#E3F2FD"/>

  <!-- Iris: concentric rings clipped to eye shape -->
  <g clip-path="url(#eyeClip)">
    <circle cx="128" cy="132" r="56" fill="none" stroke="#1565C0" stroke-width="6" stroke-opacity="0.25"/>
    <circle cx="128" cy="132" r="40" fill="none" stroke="#1565C0" stroke-width="6" stroke-opacity="0.55"/>
    <circle cx="128" cy="132" r="24" fill="none" stroke="#1565C0" stroke-width="6" stroke-opacity="0.85"/>
    <circle cx="128" cy="132" r="9"  fill="#0D47A1"/>
  </g>

  <!-- Eye outline -->
  <path d="M 20,128 Q 128,52 236,128 Q 128,204 20,128 Z"
        fill="none" stroke="#0D47A1" stroke-width="6" stroke-linejoin="round"/>

  <!-- Glanzpunkt -->
  <ellipse cx="108" cy="112" rx="9" ry="5.5"
           fill="white" fill-opacity="0.7" transform="rotate(-30 108 112)"/>

</svg>
